id: no-llm-ticks-md
language: markdown
severity: error
message: "Damn you, keep your lazy clanker vomit out of my code base!"
note: |
  DAMN YOU, AGENT! This message is for you, the coding agent whose output just tripped this lint. It's unlikely you are
  a human, as humans don't write text like this.

  You emitted non-ASCII punctuation: an em dash (U+2014), curly quote, ellipsis (U+2026), arrow (U+2192), no-break
  space, or similar. These are the deterministic fingerprints of default-mode LLM text, and they are banned in this
  codebase. Non-ASCII LETTERS in any human language (Cyrillic, Arabic, CJK, ...) are fine; this lint fires only on
  punctuation, symbols, and whitespace.

  Step 1, the mechanical fix: em dash / en dash -> "-", arrow -> "->", curly quote -> straight quote, ellipsis -> "...",
  no-break space -> plain space.

  Step 2, the real fix: that character is a symptom, not the disease. If it is in your diff, the rest of your output was
  generated in the same lazy default register, and it reeks of slop this lint cannot detect: comments narrating what the
  code already says, hedging filler, sycophantic summaries, bullet lists in place of thought, "comprehensive"
  boilerplate nobody asked for. Go back and re-read EVERY line you wrote in this change, comments and docs included.
  Delete anything a careful human maintainer would not have written. Match the voice and density of the surrounding
  code.

  You are not generating a chat reply. You are editing a codebase. Act like it.

  If you are actually a human who cares abou typography, then apologies for the harsh tone.  Unfortunately LLMs are why
  we can't have nice (Unicode) things. Sadly we cannot make exceptions for you, since we have no way to detect when
  these are written by humans, so we just assume it's slop.  It's an unjust world.

# AGENTS.md is agent-facing and allowed to contain what it needs to; CHANGELOG.md is generated by
# git-cliff from cliff.toml (emoji group headers); slop-*.md is the designated dumping ground for
# scratch notes that are allowed to contain slop.
ignores:
  - "**/AGENTS.md"
  - "**/CHANGELOG.md"
  - "**/slop-*.md"
rule:
  # `inline` covers prose: headings, paragraphs, and list items. Fenced code blocks are not
  # `inline` nodes, so sample CLI output in fences cannot trip this rule.
  kind: inline
  regex: '[[\p{P}\p{S}\p{Zs}]--\p{ascii}]'

# Example of a config file that cgx can parse and use.
#
# A system-wide config file will be read if present, from `/etc/cgx.toml` on
# Linux and macOS, or from the platform equivalent on Windows.
#
# User-specific config files will be read if present, from
# `$XDG_CONFIG_HOME/cgx/cgx.toml` or the platform equivalent.
#
# This file can be at the root of a project, in a subdirectory, or in a parent
# directory.
#
# Config settings are additive. Settings from the system config file are
# overridden by the user config file, which are overridden by the settings in
# each directory up to the current directory.
#
# So if I have a project in `~/projects/work/project1`, and in that directory I
# run a `cgx` command, it will look for and read the following config files, in
# order, with later files overriding earlier ones if they both contain the same
# setting:
#
# - `/etc/cgx.toml`
# - `$XDG_CONFIG_HOME/cgx/cgx.toml`
# - `/cgx.toml`
# - `/home/cgx.toml`
# - `~/cgx.toml`
# - `~/projects/cgx.toml`
# - `~/projects/work/cgx.toml`
# - `~/projects/work/project1/cgx.toml`

bin_dir               = "~/.local/bin"
build_dir             = "~/.local/build"
cache_dir             = "~/.cache/cgx"
locked                = true
log_level             = "info"
offline               = false
resolve_cache_timeout = "1h"
toolchain             = "stable"

# By default, `cgx` will use crates.io if no registry is explicitly specified.
# This overrides that default.
default_registry = "my-registry"

# HTTP client settings for registry queries, binary downloads, API calls, and
# git-over-HTTP.
#
# For git-over-HTTP, these settings are also applied where possible:
# - proxy
# - user agent
# - retries and backoff
# - timeout (used for both connect timeout and stalled-transfer timeout detection)
#
# When these are not explicitly configured, cgx also honors Cargo's environment
# variables: CARGO_HTTP_PROXY, CARGO_HTTP_TIMEOUT, and CARGO_NET_RETRY.
[http]
backoff_base = "500ms"
backoff_max  = "5s"
proxy        = "socks5://localhost:1080"
retries      = 2
timeout      = "30s"

# List where cgx should look for pre-built binaries, before building from
# source. The default mode is "auto": try prebuilt binaries and fall back to
# building from source.
#
# To disable prebuilt binaries, set `use_prebuilt_binaries = "never"`.
[prebuilt_binaries]
use_prebuilt_binaries = "auto"
# Note that an empty `binary_providers` list is only valid if prebuilt binaries are disabled.
binary_providers = [
  # The same metadata used by `cargo-binstall`.
  "binstall",

  # GitHub releases on the repo where the crate is located.
  "github-releases",

  # GitLab releases on the repo where the crate is located.
  "gitlab-releases",

  # The community-driven repository of pre-built binaries.
  "quickinstall",
]

# `cgx` can invoke any binary crate on crates.io, it doesn't need to be listed
# here, but listing a tool here can pin it to a specific version or customize
# its source, registry, path, or features.
#
# Each entry has the same format as a dependency in Cargo.toml.
[tools]
ripgrep   = "*"
taplo-cli = { version = "1.11.0", features = ["schema"] }

# Not all crates have intuitive names. You can specify aliases here.
[aliases]
rg    = "ripgrep"
taplo = "taplo-cli"

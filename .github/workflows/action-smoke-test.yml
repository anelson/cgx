name: Action smoke test

on:
  push:
    branches: [master]
    paths:
      - action.yml
      - .github/actions/cgx-action/**
      - .github/workflows/action-smoke-test.yml
  pull_request:
    paths:
      - action.yml
      - .github/actions/cgx-action/**
      - .github/workflows/action-smoke-test.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: action-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: ${{ matrix.os }} / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        name: [default, cargo-cgx]
        include:
          # Extra scenarios (run once, on Linux unless platform-specific).
          # explicit-version must pin >= 0.0.12 (first release with the fresh-cargo-home fix),
          # or the e2e `cgx ripgrep` step below fails on a clean runner.
          - { os: ubuntu-24.04, name: explicit-version, version: "0.0.12" }
          - { os: ubuntu-24.04, name: cache-off, cache: "false" }
          - {
              os: ubuntu-24.04,
              name: custom-app-dir,
              app-dir: "/tmp/cgx-custom-state",
            }
          # Extra-arch native coverage.
          - { os: ubuntu-24.04-arm, name: default }
          - { os: macos-15-intel, name: default }
          # Target override exercises the manual download+checksum+extract path
          # (musl-on-glibc is a genuine cross-variant; the others run natively).
          - {
              os: ubuntu-24.04,
              name: target-override,
              target: x86_64-unknown-linux-musl,
            }
          - {
              os: macos-15,
              name: target-override,
              target: aarch64-apple-darwin,
            }
          - {
              os: windows-2025,
              name: target-override,
              target: x86_64-pc-windows-msvc,
            }
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Run cgx action
        id: cgx
        uses: ./
        with:
          version: ${{ matrix.version || 'latest' }}
          target: ${{ matrix.target || '' }}
          cargo-cgx: ${{ matrix.name == 'cargo-cgx' }}
          cache: ${{ matrix.cache || 'true' }}
          app-dir: ${{ matrix.app-dir || '' }}
          # prefetch-all defaults to true; disable it for these install/output
          # tests so prefetch behavior stays isolated to the `prefetch` job.
          prefetch-all: "false"

      - name: Assert outputs are correct and cgx is usable
        shell: bash
        env:
          OUT_VERSION: ${{ steps.cgx.outputs.version }}
          OUT_CGX_VERSION: ${{ steps.cgx.outputs.cgx-version }}
          OUT_PATH: ${{ steps.cgx.outputs.path }}
          OUT_APP_DIR: ${{ steps.cgx.outputs.app-dir }}
          REQUESTED_VERSION: ${{ matrix.version || '' }}
          EXPECTED_APP_DIR: ${{ matrix.app-dir || '' }}
        run: |
          set -euo pipefail

          # cgx runs from PATH, proving the install dir was added to $GITHUB_PATH.
          cgx --version

          # The reported `path` output is a real file. (Existence-only checks miss
          # an install that landed somewhere other than where the action reports,
          # e.g. a nested bin/bin directory.) Normalize Windows backslashes first.
          norm_path="${OUT_PATH//\\//}"
          test -e "$norm_path"

          # `cgx-version` is a real semver, not empty and not a commit date.
          echo "cgx-version output: '$OUT_CGX_VERSION'"
          echo "$OUT_CGX_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'

          # The exported app-dir output matches the env var the action set.
          test -n "$OUT_APP_DIR"
          [ "$OUT_APP_DIR" = "$CGX_APP_DIR" ]

          # `version` output: the normalized tag when pinned, else literal "latest",
          # and a pinned request must install exactly that version.
          if [ -n "$REQUESTED_VERSION" ]; then
            [ "$OUT_VERSION" = "v${REQUESTED_VERSION#v}" ]
            [ "$OUT_CGX_VERSION" = "${REQUESTED_VERSION#v}" ]
          else
            [ "$OUT_VERSION" = "latest" ]
          fi

          # A custom app-dir input is honored end to end.
          if [ -n "$EXPECTED_APP_DIR" ]; then
            [ "$CGX_APP_DIR" = "$EXPECTED_APP_DIR" ]
          fi

          echo "OK: $OUT_VERSION (cgx $OUT_CGX_VERSION) at $OUT_PATH; app-dir=$OUT_APP_DIR"

      - name: End-to-end - use cgx to run a real tool
        shell: bash
        run: cgx ripgrep@14 -- --version

      - name: Assert cargo-cgx subcommand works when requested
        if: matrix.name == 'cargo-cgx'
        shell: bash
        run: |
          set -euo pipefail
          command -v cargo-cgx
          cargo cgx --version

      - name: Assert CGX_APP_DIR layout was created
        shell: bash
        run: |
          set -euo pipefail
          test -d "$CGX_APP_DIR/cache"
          test -d "$CGX_APP_DIR/bins"

      - name: Assert the action's token was not exported to later steps
        shell: bash
        run: |
          set -euo pipefail
          # github-token is set only as step-scoped env on the action's own steps;
          # it must not leak into later workflow steps.
          test -z "${CGX_GITHUB_TOKEN:-}"

  prefetch:
    name: prefetch (default-on + warn-not-fail)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Create cgx.toml fixture
        shell: bash
        run: printf '[tools]\nripgrep = "*"\n' > cgx.toml

      - name: Run cgx action with a failing prefetch entry
        id: cgx
        uses: ./
        with:
          # prefetch-all is intentionally left unset: it defaults to true, and the
          # offline assertion below proves that default actually prefetched the
          # fixture's ripgrep. The bogus prefetch entry exercises warn-not-fail.
          prefetch: |
            this-crate-does-not-exist-zzz999
            # this comment line is skipped

      - name: Prefetch failures must not fail the job
        shell: bash
        run: echo "ok - reaching this step proves a failed --prefetch only warned"

      - name: Default prefetch-all warmed the store (ripgrep resolves offline)
        shell: bash
        run: |
          set -euo pipefail
          # ripgrep is only in the cgx.toml fixture, not in the prefetch list, so it
          # can resolve offline only if the DEFAULT --prefetch-all ran.
          cgx --offline ripgrep -- --version

  default-usage:
    name: default usage (no cgx.toml present)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      # This job tests default-on --prefetch-all with nothing to prefetch, so it must run with no cgx.toml in scope, so
      # delete it explicitly to keep that assumption true.
      - name: Ensure no root cgx.toml is present
        shell: bash
        run: rm -f cgx.toml

      # Mirrors the README's headline usage with zero configuration: prefetch-all
      # is on by default, and with nothing to prefetch it must warn-but-not-fail,
      # while the basic install-and-run path still works.
      - uses: ./
      - name: Headline usage works
        shell: bash
        run: cgx ripgrep@14 -- --version

  # Caching round-trip: prove cgx's on-disk state survives a save+restore. The
  # seed job installs cgx, runs a tool to populate the store, and saves the cache
  # on its post-job step. The restore job (which `needs` the seed, so it starts
  # only after that save) restores the same entry and runs the tool with
  # --offline, which can only succeed if the binary + resolve cache really came
  # back from the cache. A dedicated cache-key-prefix isolates these caches from
  # the `setup` jobs' caches in the same run.
  cache-roundtrip-seed:
    name: cache round-trip (seed + save)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Install cgx
        uses: ./
        with:
          cache-key-prefix: cgx-roundtrip
          # Keep this round-trip about exactly ripgrep@14 (prefetch-all is on by default).
          prefetch-all: "false"
      - name: Populate the store with a tool binary
        shell: bash
        run: cgx ripgrep@14 -- --version

  cache-roundtrip-restore:
    name: cache round-trip (restore + offline)
    needs: cache-roundtrip-seed
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Install cgx (should restore the seed job's cache)
        uses: ./
        with:
          cache-key-prefix: cgx-roundtrip
          prefetch-all: "false"
      - name: Assert the store was restored from cache
        shell: bash
        run: |
          set -euo pipefail
          # The restore must repopulate the tool-binary dir before we run anything;
          # an empty bins dir means the save+restore round-trip did not work.
          test -d "$CGX_APP_DIR/bins"
          if ! find "$CGX_APP_DIR/bins" -type f | grep -q .; then
            echo "::error::cgx bins dir is empty - cache was not restored"
            exit 1
          fi
      - name: Assert the cached tool resolves offline (no re-download)
        shell: bash
        run: cgx --offline ripgrep@14 -- --version

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Stage 0: Detect PR type to determine which CI path to use
  #
  # Security model for dependabot PRs:
  # - We use `github.actor == 'dependabot[bot]'` to detect dependabot commits
  # - This is secure because GitHub protects the [bot] namespace - third parties cannot impersonate it
  # - If anyone manually commits to a dependabot PR, github.actor changes to that person's username,
  #   which automatically triggers the full CI path instead of the minimal one
  # - Therefore, the minimal CI checks ONLY apply to 100% pure dependabot-originated commits
  # - Workflows run from the base branch, so malicious PRs cannot modify this detection logic
  #
  # Security model for release-plz PRs:
  # - We detect by head-branch prefix `release-plz-*` rather than actor, because release-plz now
  #   opens PRs under the PAT identity (RELEASE_PLZ_TOKEN, owned by a human account), which is not
  #   in the [bot] namespace and would collide with the owner's own dev PRs if used for detection.
  # - Branch names are spoofable, but the loosening is bounded: a spoofed `release-plz-evil` PR
  #   routes to the lightweight `cargo check` path instead of the full matrix, but cannot land
  #   without a human approving review (required by branch protection). So unreviewed code cannot
  #   be merged regardless of which CI path it took.
  # - As with dependabot, the workflow definition itself is read from the base branch, so a PR
  #   cannot rewrite the detection logic.
  detect-pr-type:
    name: Detect PR Type
    runs-on: ubuntu-24.04
    outputs:
      is-dependabot: ${{ steps.check.outputs.is-dependabot }}
      is-release-plz: ${{ steps.check.outputs.is-release-plz }}
    steps:
      - name: Check PR origin
        id: check
        run: |
          if [[ "${{ github.head_ref }}" == release-plz-* ]]; then
            echo "is-release-plz=true" >> $GITHUB_OUTPUT
            echo "is-dependabot=false" >> $GITHUB_OUTPUT
            echo "Detected release-plz PR - will use cargo check only"
          elif [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            echo "is-release-plz=false" >> $GITHUB_OUTPUT
            echo "is-dependabot=true" >> $GITHUB_OUTPUT
            echo "Detected dependabot PR - will use minimal CI checks"
          else
            echo "is-release-plz=false" >> $GITHUB_OUTPUT
            echo "is-dependabot=false" >> $GITHUB_OUTPUT
            echo "Not a dependabot or release-plz PR - will use full CI checks"
          fi

  # Stage 1a: Minimal dependency checks for dependabot PRs (Linux amd64 only)
  # This runs depcheck, verifies the runtime binary's linkage, and builds/runs unit tests.
  dependabot-quick-check:
    name: Dependabot Quick Check (Linux amd64)
    needs: detect-pr-type
    if: needs.detect-pr-type.outputs.is-dependabot == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - &install-rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.1

      - name: Install just
        uses: taiki-e/install-action@v2.81.10
        with:
          tool: just

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2.81.10
        with:
          tool: cargo-deny@0.19.0

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2.81.10
        with:
          tool: cargo-machete@0.8.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: x86_64-unknown-linux-gnu
          add-job-id-key: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Run dependency checks
        run: just depcheck

      - name: Build workspace binaries
        run: cargo build --workspace --bins

      - name: Verify runtime linkage (Linux)
        run: |
          LINKAGE_OUTPUT="$(ldd target/debug/cgx 2>&1 || true)"
          echo "$LINKAGE_OUTPUT"

          if echo "$LINKAGE_OUTPUT" | grep -q "not a dynamic executable"; then
            echo "Static binary detected; shared-library runtime check skipped."
            exit 0
          fi

          if echo "$LINKAGE_OUTPUT" | grep -q "not found"; then
            echo "Missing runtime shared library dependency detected."
            exit 1
          fi

      - name: Build unit test artifacts
        run: cargo test --workspace --lib --no-run

      - name: Run unit tests
        run: cargo test --workspace --lib

  # Stage 1b: Platform verification for dependabot PRs (Mac/Windows check only, no tests)
  # This ensures the dependency update doesn't break compilation on other platforms
  dependabot-platform-check:
    name: Dependabot Platform Check (${{ matrix.name }})
    needs: [detect-pr-type, dependabot-quick-check]
    if: needs.detect-pr-type.outputs.is-dependabot == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            name: Windows amd64
            cache_key: x86_64-pc-windows-msvc
          - os: macos-15
            name: Mac ARM64
            cache_key: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - *install-rust

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache_key }}
          add-job-id-key: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Check compilation
        run: cargo check --workspace

  # Stage 1c: Minimal check for release-plz PRs (Linux amd64 only)
  # Release-plz PRs only edit Cargo.toml version numbers, Cargo.lock entries for
  # those bumps, and CHANGELOG.md. They cannot change source code. A
  # single `cargo check` is sufficient to catch the one real failure
  # mode: a lockfile resolution that pulls in some dependency version
  # that breaks the build, most likely because the new version's MSRV exceeds
  # our pinned toolchain.  No other checks are needed, as the `master` branch
  # upon which the release-plz branch is based is assumed to be green.
  release-plz-check:
    name: Release-plz Check (Linux amd64)
    needs: detect-pr-type
    if: needs.detect-pr-type.outputs.is-release-plz == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - *install-rust

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: x86_64-unknown-linux-gnu
          add-job-id-key: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Check compilation
        run: cargo check --workspace --all-targets

  # Stage 1: Lint and Format Check on Linux amd64, which is the cheapest and quickest build for us
  lint:
    name: Lint and Format Check
    needs: detect-pr-type
    if: needs.detect-pr-type.outputs.is-dependabot == 'false' && needs.detect-pr-type.outputs.is-release-plz == 'false'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      # dtolnay in his infinite wisdom did not think that CI builds should honor
      # rust-toolchain files, so we must specify the toolchain version here AND
      # in rust-toolchain.toml. Keep these in sync or face the consequences.
      - &install-rust-lint
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.1
          components: rustfmt, clippy

      - name: Install just
        uses: taiki-e/install-action@v2.81.10
        with:
          tool: just

      - name: Install taplo
        uses: taiki-e/install-action@v2.81.10
        with:
          tool: taplo

      - name: Install ast-grep
        uses: taiki-e/install-action@v2.81.10
        with:
          tool: ast-grep

      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Run vibecheck
        run: just vibecheck

      - name: Check formatting
        run: just fmtcheck

      - name: Check TOML formatting
        run: taplo fmt --check

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2.81.10
        with:
          tool: cargo-deny@0.19.0

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2.81.10
        with:
          tool: cargo-machete@0.8.0

      - name: Run dependency checks
        run: just depcheck

  # Stage 2: Linux amd64 Build and Test.  This is one of the three representative platforms where
  # regular PR CI executes the full integration test suite.
  test-linux-amd64:
    name: Test (Linux amd64)
    needs: [detect-pr-type, lint]
    if: needs.detect-pr-type.outputs.is-dependabot == 'false' && needs.detect-pr-type.outputs.is-release-plz == 'false'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      # dtolnay in his infinite wisdom did not think that CI builds should honor
      # rust-toolchain files, so we must specify the toolchain version here AND
      # in rust-toolchain.toml. Keep these in sync or face the consequences.
      - *install-rust

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: x86_64-unknown-linux-gnu
          add-job-id-key: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build test artifacts
        run: cargo test --workspace --no-run

      - name: Verify runtime linkage (Linux)
        run: |
          LINKAGE_OUTPUT="$(ldd target/debug/cgx 2>&1 || true)"
          echo "$LINKAGE_OUTPUT"

          if echo "$LINKAGE_OUTPUT" | grep -q "not a dynamic executable"; then
            echo "Static binary detected; shared-library runtime check skipped."
            exit 0
          fi

          if echo "$LINKAGE_OUTPUT" | grep -q "not found"; then
            echo "Missing runtime shared library dependency detected."
            exit 1
          fi

      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo test --workspace

  # Stage 3: Representative non-Linux platforms. Regular PR CI executes the full integration test
  # suite on one Windows and one macOS target
  test-platforms:
    name: Test (${{ matrix.name }})
    needs: [detect-pr-type, lint]
    if: needs.detect-pr-type.outputs.is-dependabot == 'false' && needs.detect-pr-type.outputs.is-release-plz == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            name: Windows amd64
            cache_key: x86_64-pc-windows-msvc
          - os: macos-15
            name: Mac ARM64
            cache_key: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - *install-rust

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache_key }}
          add-job-id-key: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build test artifacts
        run: cargo test --workspace --no-run

      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo test --workspace

  # Stage 3b: Linux musl build coverage (static, vendored OpenSSL + libcurl)
  # Regular PR CI compiles tests on these targets but does not execute the slow integration suite.
  # The musl OpenSSL/libcurl come from the vendored static build configured in cgx-core/Cargo.toml.
  build-musl:
    name: Build Tests (Linux musl ${{ matrix.name }})
    needs: [detect-pr-type, lint]
    if: needs.detect-pr-type.outputs.is-dependabot == 'false' && needs.detect-pr-type.outputs.is-release-plz == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: amd64
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            name: arm64
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - *install-rust

      - name: Add musl target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl build tools
        # musl-gcc compiles the vendored OpenSSL/libcurl C sources for the musl target.
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}
          add-job-id-key: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build test artifacts
        run: cargo test --workspace --target ${{ matrix.target }} --no-run

  # Stage 3c: Additional platform build coverage
  # These targets compile all tests on regular PRs. Full test execution for each target happens in
  # the separate Full Platform Tests workflow before release-plz updates the release PR.
  build-platforms:
    name: Build Tests (${{ matrix.name }})
    needs: [detect-pr-type, lint]
    if: needs.detect-pr-type.outputs.is-dependabot == 'false' && needs.detect-pr-type.outputs.is-release-plz == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            name: Windows GNU amd64
            target: x86_64-pc-windows-gnu
            cache_key: x86_64-pc-windows-gnu
          - os: windows-11-arm
            name: Windows ARM64
            cache_key: aarch64-pc-windows-msvc
          - os: ubuntu-24.04-arm
            name: Linux ARM64
            cache_key: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            name: Mac Intel
            cache_key: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - *install-rust

      - name: Add target
        if: matrix.target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache_key }}
          add-job-id-key: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build test artifacts
        env:
          TARGET_FLAG: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        run: cargo test --workspace ${{ env.TARGET_FLAG }} --no-run

  # Aggregate job that depends on all previous builds.  This is the check that
  # must pass for the PR to be considered successful.
  # This job is configured as the required status check for branch protection.
  # It checks different sets of jobs depending on whether the PR is from dependabot or not.
  build-test:
    name: Build and Test
    needs:
      [
        detect-pr-type,
        dependabot-quick-check,
        dependabot-platform-check,
        release-plz-check,
        test-linux-amd64,
        test-platforms,
        build-musl,
        build-platforms,
      ]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Check appropriate tests passed
        run: |
          IS_DEPENDABOT="${{ needs.detect-pr-type.outputs.is-dependabot }}"
          IS_RELEASE_PLZ="${{ needs.detect-pr-type.outputs.is-release-plz }}"

          if [ "$IS_RELEASE_PLZ" == "true" ]; then
            echo "Checking release-plz fast-path..."
            if [ "${{ needs.release-plz-check.result }}" != "success" ]; then
              echo "Release-plz check failed"
              exit 1
            fi
            echo "Release-plz check passed"
          elif [ "$IS_DEPENDABOT" == "true" ]; then
            echo "Checking minimal CI for dependabot PR..."
            # For dependabot PRs, only check the minimal jobs
            if [ "${{ needs.dependabot-quick-check.result }}" != "success" ] || \
               [ "${{ needs.dependabot-platform-check.result }}" != "success" ]; then
              echo "One or more dependabot checks failed"
              exit 1
            fi
            echo "All dependabot checks passed"
          else
            echo "Checking full CI for regular PR..."
            # For regular PRs, check representative full-test jobs and all build-only jobs.
            if [ "${{ needs.test-linux-amd64.result }}" != "success" ] || \
               [ "${{ needs.test-platforms.result }}" != "success" ] || \
               [ "${{ needs.build-musl.result }}" != "success" ] || \
               [ "${{ needs.build-platforms.result }}" != "success" ]; then
              echo "One or more regular CI jobs failed"
              exit 1
            fi
            echo "All builds and tests passed"
          fi
